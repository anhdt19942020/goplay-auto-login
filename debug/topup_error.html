    <script>$(function () {
            $(".vtc-user-login").on("input change", function () {
                if ($(".vtc-user-login").val().length > 0) {
                    $("#clearUsername").removeClass("d-none");
                } else {
                    $("#clearUsername").addClass("d-none");
                }
            });

            $("#clearUsername").on("click", function () {
                $(".vtc-user-login").val("").trigger("input");
                $(this).addClass("d-none");
            });

            $("#btn-submit-username").on("click", async function (e) {
                e.preventDefault();
                let valid = checkValidateLogin($(".vtc-user-login").val());
                if (valid != null) {
                    if (valid.valid) {
                        var dataInput = {}
                        dataInput.inputUserName = valid.type == "phone" ? formatphoneNumber($(".vtc-user-login").val()) : $(".vtc-user-login").val();
                        let result = await CallPageHandlerApi('CheckLogin', dataInput, 'Đang kiểm tra');
                        let redirectUrl = result.redirectUrl || "";
                        $(".text-danger").text(result.message);
                        $(".input-error").removeClass("d-none");
                        $(".vtc-user-login").addClass("is-invalid");
                        if (result.success) {
                            $(".vtc-user-login").attr("disabled", true);
                            $("#clearUsername").hide();
                            let html = `<a href="${redirectUrl}" class="cts-sso-btn" >Tạo tài khoản</a>
                                    <button class="cts-sso-btn btn-back" >Quay lại</button>`;
                            $(".cts-form-group-btn").html(html);
                        }
                    } else {
                        $(".text-danger").text(valid.message);                                                                                                                                                                                                                         
                        $(".input-error").removeClass("d-none");
                        $(".vtc-user-login").addClass("is-invalid");
                    }
                }
            });
            $(document).on("click", "#btn-back", function () {
                window.history.back();
